apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-lasterp
  labels:
    app: {{ .Release.Name }}-lasterp
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-lasterp
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-lasterp
    spec:
      containers:
        - name: lasterp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
