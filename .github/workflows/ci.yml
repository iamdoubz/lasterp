name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: pnpm install
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - run: pnpm --dir web run lint
      - run: ./scripts/spdx-lint.sh
      - run: ./scripts/dco-check.sh origin/${{ github.base_ref || 'main' }} HEAD
        if: github.event_name == 'pull_request'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: pnpm install
      - run: go test ./...
      - run: pnpm --dir web run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: build solo binary
        run: go build -o bin/lasterp ./cmd/lasterp
      - name: build docker image
        run: docker build -f deploy/Dockerfile -t lasterp:ci .
      - uses: azure/setup-helm@v4
      - name: lint helm chart
        run: helm lint deploy/helm/lasterp
