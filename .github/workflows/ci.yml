name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm install -g pnpm@9.15.0
      - run: pnpm install
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - run: pnpm --dir web run lint
      - run: ./scripts/spdx-lint.sh
      - run: ./scripts/i18n-lint.sh
      - run: ./scripts/dco-check.sh origin/${{ github.base_ref || 'main' }} HEAD
        if: github.event_name == 'pull_request'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm install -g pnpm@9.15.0
      - run: pnpm install
      - run: go test ./...
      - run: pnpm --dir web run test

  # The Integrity Gauntlet (docs/19 §3): a dedicated, non-skippable gate for
  # data-integrity enforcement. v1 runs the invariant registry gate (every
  # required INV-* has a tagged test) and the adversarial writer suite
  # (append-only role separation + triggers, RLS cross-tenant, optimistic
  # concurrency) on Postgres AND SQLite. The heavier nightly tiers named in
  # docs/19 — mutation, chaos, fuzz — are WP-6.7. No green gauntlet, no merge.
  integrity-gauntlet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - name: run integrity gauntlet
        run: go test -count=1 ./kernel/integrity/...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - name: build solo binary
        run: go build -o bin/lasterp ./cmd/lasterp
      - name: build docker image
        run: docker build -f deploy/Dockerfile -t lasterp:ci .
      - uses: azure/setup-helm@v5
      - name: lint helm chart
        run: helm lint deploy/helm/lasterp
